<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>K-Profit | Ventas Universales</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .producto-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans p-4 md:p-8 overflow-x-hidden">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 mb-8 flex flex-wrap gap-4 md:gap-6 justify-center rounded-2xl shadow-lg">
        <a href="index.html" class="text-orange-500 font-bold border-b-2 border-orange-500 transition-all">🍗 Ventas</a>
        <a href="html/inventarios.html" class="text-slate-400 hover:text-orange-500 font-bold transition-all">📦 Inventario</a>
        <a href="html/finanzas.html" class="text-slate-400 hover:text-orange-500 font-bold transition-all">📊 Finanzas</a>
        <a href="html/configuracion.html" class="text-slate-400 hover:text-orange-500 font-bold transition-all">⚙️ Configuración</a>
    </nav>

    <div class="flex flex-col md:flex-row h-auto md:h-[calc(100vh-160px)] gap-6">
        
        <main class="flex-1 flex flex-col border-b md:border-b-0 md:border-r border-slate-800 pb-6 md:pb-0">
            
            <header class="p-2 bg-slate-900/50 backdrop-blur-md flex gap-3 overflow-x-auto hide-scrollbar border-b border-slate-800 sticky top-0 z-10 rounded-t-2xl">
                <button onclick="resaltarFiltro('todos', this)" class="filter-btn px-6 py-2 bg-orange-600 rounded-full font-bold whitespace-nowrap text-xs md:text-sm transition-all text-white">🌟 Todos</button>
                <button onclick="resaltarFiltro('paquetes', this)" class="filter-btn px-6 py-2 bg-slate-800 rounded-full font-bold whitespace-nowrap text-xs md:text-sm text-slate-400">🍗 Paquetes</button>
                <button onclick="resaltarFiltro('extras', this)" class="filter-btn px-6 py-2 bg-slate-800 rounded-full font-bold whitespace-nowrap text-xs md:text-sm text-slate-400"> Extras</button>
                <button onclick="resaltarFiltro('bebidas', this)" class="filter-btn px-6 py-2 bg-slate-800 rounded-full font-bold whitespace-nowrap text-xs md:text-sm text-slate-400">🥤 Bebidas</button>
            </header>

            <section id="grid-productos" class="p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 overflow-y-auto hide-scrollbar">
                </section>
        </main>

        <aside class="w-full md:w-80 lg:w-96 bg-slate-900 flex flex-col rounded-3xl shadow-2xl border border-slate-800 overflow-hidden">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <h2 class="font-bold flex items-center gap-2"><span class="text-orange-500">🛒</span> Orden</h2>
                <button onclick="vaciarCarrito()" class="text-[10px] text-slate-500 hover:text-red-400 font-black uppercase tracking-widest transition-colors">Vaciar</button>
            </div>

            <div id="contenedor-carrito" class="flex-1 overflow-y-auto p-4 space-y-3 min-h-[200px]"></div>

            <div class="p-6 bg-slate-950 border-t border-slate-800">
                <div class="flex justify-between items-end mb-4">
                    <span class="text-slate-500 font-bold text-xs uppercase">Total Final</span>
                    <span id="total-ticket" class="text-3xl font-black text-green-400 font-mono">$0.00</span>
                </div>
                <button onclick="abrirModal()" class="w-full bg-orange-600 hover:bg-orange-500 py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all">REGISTRAR VENTA</button>
            </div>
        </aside>
    </div>

    <div id="modal-cobro" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div class="p-8 space-y-6">
                <div class="text-center">
                    <p class="text-xs text-slate-500 uppercase font-black mb-1">Total a Cobrar</p>
                    <p class="text-4xl md:text-5xl font-black text-green-400 font-mono" id="modal-total">$0.00</p>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="pagoRapido(50)" class="bg-slate-800 p-4 rounded-2xl font-bold text-orange-200 border border-slate-700 hover:bg-slate-700 transition-colors">$50</button>
                    <button onclick="pagoRapido(100)" class="bg-slate-800 p-4 rounded-2xl font-bold text-orange-200 border border-slate-700 hover:bg-slate-700 transition-colors">$100</button>
                    <button onclick="pagoRapido(200)" class="bg-slate-800 p-4 rounded-2xl font-bold text-orange-200 border border-slate-700 hover:bg-slate-700 transition-colors">$200</button>
                    <button onclick="pagoRapido(500)" class="bg-slate-800 p-4 rounded-2xl font-bold text-orange-200 border border-slate-700 hover:bg-slate-700 transition-colors">$500</button>
                </div>
                
                <input type="number" id="input-efectivo" placeholder="Efectivo recibido..." class="w-full bg-slate-950 border border-slate-800 p-5 rounded-2xl text-2xl text-center focus:border-orange-500 outline-none text-white font-mono">
                
                <div class="text-center p-4 bg-slate-950 rounded-2xl border border-dashed border-slate-800 font-mono">
                    <p class="text-xs text-slate-500 uppercase font-black mb-1">Cambio</p>
                    <p id="modal-cambio" class="text-3xl font-bold text-orange-400">$0.00</p>
                </div>
                
                <button onclick="confirmarVenta()" class="w-full bg-green-600 py-5 rounded-2xl font-black text-xl uppercase tracking-tighter hover:bg-green-500 transition-all shadow-lg shadow-green-900/20">Confirmar Venta</button>
                <button onclick="cerrarModal()" class="w-full text-slate-500 font-bold text-sm uppercase tracking-widest mt-2 hover:text-white transition-colors">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="JS/supabase-config.js"></script>
    <script src="JS/script.js"></script>
</body>
</html>
